<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى أغلى إنسانة</title>
    <style>
        body { background: radial-gradient(circle, #2c0000 0%, #000000 100%); color: white; text-align: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #lock-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(10px); }
        .heart-icon { color: #ff4d4d; font-size: 80px; margin-bottom: 20px; animation: pulse 1.5s infinite; text-shadow: 0 0 20px #ff4d4d; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        input { padding: 15px; border-radius: 30px; border: 2px solid #ff4d4d; background: transparent; color: white; text-align: center; font-size: 20px; outline: none; width: 250px; transition: 0.3s; }
        input:focus { box-shadow: 0 0 15px #ff4d4d; }
        button { padding: 12px 40px; background: #ff4d4d; color: white; border: none; border-radius: 30px; margin-top: 25px; cursor: pointer; font-size: 18px; font-weight: bold; box-shadow: 0 4px 15px rgba(255, 77, 77, 0.4); transition: 0.3s; }
        #content { display: none; animation: fadeIn 3s ease-in-out; max-width: 90%; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        h1 { font-size: 2rem; margin-bottom: 20px; color: #ff4d4d; text-shadow: 2px 2px 10px rgba(255, 77, 77, 0.5); }
        .love-letter { font-size: 1.3rem; line-height: 1.8; color: #fdfdfd; padding: 20px; background: rgba(255, 255, 255, 0.05); border-radius: 20px; box-shadow: inset 0 0 20px rgba(255, 77, 77, 0.1); border: 1px solid rgba(255, 77, 77, 0.2); }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="heart-icon">❤</div>
        <h2 style="margin-bottom: 20px;">أدخلي رمزنا السري</h2>
        <input type="text" id="passInput" placeholder="السنة/الشهر/اليوم">
        <button onclick="checkPass()">فتح الهدية</button>
    </div>

    <div id="content">
        <div class="heart-icon" style="font-size: 60px;">❤</div>
        <h1>أحبج موت يا زنوبتي ❤️</h1>
        <div class="love-letter">
            زنوبتي الغاليه انتِ حلم عمري وحياتي كل نبضه بگلبي تصيح بأسمج احبج حب ما يوصف الكواكب ومن كل هذا الفضاء حب ماله حدود يا كل كوني وسعادتي مستحيل اتخيل لحظه من دونج انتِ النور اللي يضوي ضلامي يا اجمل زنوبه بالدنيا اعشقج واموت عليج بكل دكة كلبي
        </div>
        <audio id="myAudio" loop>
            <source src="music.m4a" type="audio/mp4">
        </audio>
    </div>

    <script>
        function checkPass() {
            const input = document.getElementById('passInput').value;
            const secret = "MjAwNi8xLzEw"; // الرمز 2006/1/10
            
            if (btoa(input) === secret) {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                const audio = document.getElementById('myAudio');
                audio.play();
            } else {
                alert("الرمز خطأ.. حاولي مرة ثانية يا روحي");
            }
        }
    </script>
</body>
</html>
